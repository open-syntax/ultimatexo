name: Cleanup & Maintenance

on:
  schedule:
    - cron: "0 2 * * 0"
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (preview only, no deletions)"
        required: false
        type: boolean
        default: false

env:
  WORKFLOW_RUNS_RETENTION_DAYS: 7
  CACHE_RETENTION_DAYS: 7
  PACKAGES_RETENTION_DAYS: 30

permissions:
  actions: write
  contents: read
  packages: write

jobs:
  cleanup-runs:
    name: Cleanup Workflow Runs
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const days = parseInt(process.env.WORKFLOW_RUNS_RETENTION_DAYS) || 7;
            const dryRun = process.env.DRY_RUN === 'true';
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - days);
            const cutoffStr = cutoff.toISOString();

            console.log(`Deleting runs before: ${cutoffStr}`);
            console.log(`Dry run: ${dryRun}`);

            let deleted = 0;
            let page = 1;

            while (true) {
              const { data } = await github.rest.actions.listWorkflowRunsForRepo({
                owner: context.repo.owner,
                repo: context.repo.repo,
                created: `<${cutoffStr}`,
                per_page: 100,
                page
              });

              if (data.workflow_runs.length === 0) break;

              let limitReached = false;
            for (const run of data.workflow_runs) {
                if (deleted >= 2000) {
                  console.log('Safety limit reached (2000). Stopping.');
                  limitReached = true;
                  break;
                }
                if (dryRun) {
                  console.log(`[DRY RUN] Would delete run #${run.id} (${run.name})`);
                } else {
                  console.log(`Deleting run #${run.id} (${run.name})...`);
                  await github.rest.actions.deleteWorkflowRun({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    run_id: run.id
                  });
                }
                deleted++;
              }

              if (limitReached || data.workflow_runs.length < 100) break;
              page++;
            }

            console.log(`Total ${dryRun ? 'would be ' : ''}deleted: ${deleted}`);
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

  cleanup-caches:
    name: Cleanup Caches
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v8
        with:
          script: |
            const days = parseInt(process.env.CACHE_RETENTION_DAYS) || 7;
            const dryRun = process.env.DRY_RUN === 'true';
            const cutoff = new Date();
            cutoff.setDate(cutoff.getDate() - days);

            console.log(`Deleting caches not accessed since: ${cutoff.toISOString()}`);
            console.log(`Dry run: ${dryRun}`);

            const caches = await github.paginate(
              github.rest.actions.getActionsCacheList,
              {
                owner: context.repo.owner,
                repo: context.repo.repo,
                per_page: 100,
                sort: 'last_accessed_at',
                direction: 'asc'
              },
              (response) => response.data.actions_caches
            );

            let deleted = 0;
            let freedBytes = 0;

            for (const cache of caches) {
              const lastAccessed = new Date(cache.last_accessed_at);
              if (lastAccessed < cutoff) {
                const sizeMB = (cache.size_in_bytes / (1024 * 1024)).toFixed(2);
                if (dryRun) {
                  console.log(`[DRY RUN] Would delete: ${cache.key} (${sizeMB}MB)`);
                } else {
                  console.log(`Deleting: ${cache.key} (${sizeMB}MB)...`);
                  await github.rest.actions.deleteActionsCacheById({
                    owner: context.repo.owner,
                    repo: context.repo.repo,
                    cache_id: cache.id
                  });
                }
                deleted++;
                freedBytes += cache.size_in_bytes;
              }
            }

            const freedGB = (freedBytes / (1024 * 1024 * 1024)).toFixed(2);
            console.log(`Deleted: ${deleted}, Freed: ${freedGB}GB`);
        env:
          DRY_RUN: ${{ inputs.dry_run || 'false' }}

  cleanup-packages:
    name: Cleanup Packages
    runs-on: ubuntu-latest
    steps:
      - uses: snok/container-retention-policy@v3.0.1
        with:
          account: open-syntax
          token: ${{ secrets.PAT }}
          image-names: ultimatexo-client,ultimatexo-server,ultimatexo-caddy
          cut-off: ${{ env.PACKAGES_RETENTION_DAYS }}d
          keep-at-least: 5
          skip-tags: latest,main,production
          dry-run: ${{ inputs.dry_run || false }}

  report:
    name: Maintenance Report
    runs-on: ubuntu-latest
    needs: [cleanup-runs, cleanup-caches, cleanup-packages]
    if: always()
    steps:
      - name: Summary
        run: |
          echo "## Maintenance Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Task | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|------|--------|" >> "$GITHUB_STEP_SUMMARY"
          echo "| Workflow Runs | ${{ needs.cleanup-runs.result == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Caches | ${{ needs.cleanup-caches.result == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
          echo "| Packages | ${{ needs.cleanup-packages.result == 'success' && '✅' || '❌' }} |" >> "$GITHUB_STEP_SUMMARY"
