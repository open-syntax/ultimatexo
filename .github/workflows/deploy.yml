name: Deploy to Production

on:
  workflow_dispatch:
    inputs:
      version:
        description: "Version to deploy (e.g., v1.0.0, main)"
        required: true
        default: "latest"
      skip_health_check:
        description: "Skip health check (not recommended)"
        type: boolean
        default: false
  workflow_call:
    inputs:
      version:
        description: "Version to deploy"
        required: true
        type: string

concurrency:
  group: production-deploy
  cancel-in-progress: false

permissions:
  contents: read
  packages: read

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/open-syntax/ultimatexo
  DEPLOY_USER: ${{ secrets.PROD_USERNAME }}
  DEPLOY_HOST: ${{ secrets.PROD_HOST }}

jobs:
  validate:
    name: Pre-deployment Validation
    runs-on: ubuntu-latest
    environment: production
    outputs:
      version: ${{ steps.version.outputs.version }}
    steps:
      - name: Set version
        id: version
        run: |
          VERSION="${{ github.event.inputs.version || inputs.version }}"
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Deploying version: $VERSION"

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify images exist
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          for component in client server caddy; do
            IMAGE="${{ env.IMAGE_BASE }}-${component}:${VERSION}"
            echo "Checking: $IMAGE"
            if ! docker manifest inspect "$IMAGE" > /dev/null 2>&1; then
              echo "ERROR: Image not found: $IMAGE"
              exit 1
            fi
            echo "Found: $IMAGE"
          done

  deploy:
    name: Deploy
    runs-on: ubuntu-latest
    needs: validate
    environment:
      name: production
      url: https://ultimatexo.com
    steps:
      - uses: actions/checkout@v6

      - name: Prepare deployment files
        run: |
          mkdir -p deploy

          cat > deploy/.env << EOF
          IMAGE_BASE=${{ env.IMAGE_BASE }}
          VERSION=${{ needs.validate.outputs.version }}
          CLOUDFLARE_EMAIL=${{ secrets.CLOUDFLARE_EMAIL }}
          CLOUDFLARE_API_TOKEN=${{ secrets.CLOUDFLARE_API_TOKEN }}
          RUST_LOG=info
          EOF

      - name: Copy deploy script
        run: |
          mkdir -p deploy/scripts
          cp scripts/deploy.sh deploy/scripts/deploy.sh
          chmod +x deploy/scripts/deploy.sh

      - name: Copy docker-compose
        run: cp docker-compose.yml deploy/

      - name: Copy files to server
        uses: appleboy/scp-action@v1
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          source: "deploy/*"
          target: "~/ultimatexo/"
          strip_components: 1
          overwrite: true

      - name: Execute deployment
        uses: appleboy/ssh-action@v1
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}
        with:
          host: ${{ env.DEPLOY_HOST }}
          username: ${{ env.DEPLOY_USER }}
          key: ${{ secrets.PROD_SSH_KEY }}
          envs: GITHUB_TOKEN,GITHUB_ACTOR
          command_timeout: 10m
          script: |
            cd ~/ultimatexo
            export DEPLOY_DIR="$HOME/ultimatexo"
            ./scripts/deploy.sh "${{ needs.validate.outputs.version }}" "${{ github.event.inputs.skip_health_check || 'false' }}"

  verify:
    name: Post-deployment Verification
    runs-on: ubuntu-latest
    needs: deploy
    if: github.event.inputs.skip_health_check != 'true'
    steps:
      - name: Wait for stabilization
        run: sleep 30

      - name: Health checks
        run: |
          MAX_ATTEMPTS=5
          DELAY=10

          check_endpoint() {
            local url=$1
            local name=$2
            for i in $(seq 1 "$MAX_ATTEMPTS"); do
              echo "[$i/$MAX_ATTEMPTS] Checking $name..."
              if curl -fsSL "$url" > /dev/null 2>&1; then
                echo "OK: $name"
                return 0
              fi
              [ "$i" -lt "$MAX_ATTEMPTS" ] && sleep "$DELAY"
            done
            echo "FAILED: $name"
            return 1
          }

          FAILED=0
          check_endpoint "https://ultimatexo.com" "Homepage" || FAILED=1
          check_endpoint "https://ultimatexo.com/api/health" "API Health" || FAILED=1

          if [ "$FAILED" -eq 1 ]; then
            echo "Verification failed"
            exit 1
          fi
          echo "All checks passed"

      - name: Performance check
        run: |
          RESPONSE_TIME=$(curl -o /dev/null -s -w '%{time_total}\n' https://ultimatexo.com)
          echo "Response time: ${RESPONSE_TIME}s"
          if (( $(echo "$RESPONSE_TIME > 2.0" | bc -l) )); then
            echo "WARNING: Response time above 2s"
          else
            echo "Response time acceptable"
          fi

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [validate, deploy, verify]
    if: always()
    steps:
      - name: Discord notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: ${{ needs.deploy.result == 'success' && '✅ Deployment Successful' || '❌ Deployment Failed' }}
          description: |
            **Version:** `${{ needs.validate.outputs.version }}`
            **Status:** ${{ needs.deploy.result == 'success' && 'Deployed' || 'Failed' }}
            **Health Check:** ${{ needs.verify.result == 'skipped' && 'Skipped' || needs.verify.result == 'success' && 'Passed' || 'Failed' }}
            [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          color: ${{ needs.deploy.result == 'success' && 0x28a745 || 0xdc3545 }}
          username: "UltimateXO Deploy"

      - name: Deployment summary
        if: always()
        run: |
          cat >> "$GITHUB_STEP_SUMMARY" << EOF
          ## Deployment Summary

          **Version:** \`${{ needs.validate.outputs.version }}\`
          **Status:** ${{ needs.deploy.result == 'success' && needs.verify.result != 'failure' && '✅ Success' || '❌ Failed' }}

          | Stage | Status |
          |-------|--------|
          | Validation | ${{ needs.validate.result == 'success' && '✅' || '❌' }} |
          | Deploy | ${{ needs.deploy.result == 'success' && '✅' || '❌' }} |
          | Verify | ${{ needs.verify.result == 'success' && '✅' || needs.verify.result == 'skipped' && '⏭️' || '❌' }} |
          EOF
