name: Build & Publish

on:
  workflow_dispatch:
    inputs:
      trigger_ref:
        description: "Git ref that triggered this build"
        required: false
        default: "main"
      trigger_sha:
        description: "Commit SHA"
        required: false
  push:
    tags: ["v*"]

concurrency:
  group: build-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: read
  packages: write
  security-events: write

env:
  REGISTRY: ghcr.io
  IMAGE_BASE: ghcr.io/open-syntax/ultimatexo

jobs:
  meta:
    name: Generate Metadata
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tags: ${{ steps.tags.outputs.tags }}
    steps:
      - uses: actions/checkout@v6

      - name: Determine version
        id: version
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            VERSION="${GITHUB_REF#refs/tags/}"
          else
            VERSION="${{ github.event.inputs.trigger_ref || 'main' }}"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "Version: $VERSION"

      - name: Generate tags
        id: tags
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          if [[ "$VERSION" == v* ]]; then
            MAJOR="${VERSION#v}"
            MAJOR="${MAJOR%%.*}"
            MINOR="${VERSION#v}"
            MINOR="${MINOR%.*}"
            TAGS="$VERSION,$MINOR"
            [[ "$MAJOR" != "0" ]] && TAGS="$TAGS,$MAJOR"
            TAGS="$TAGS,latest"
          else
            TAGS="$VERSION"
          fi
          echo "tags=$TAGS" >> "$GITHUB_OUTPUT"
          echo "Tags: $TAGS"

  build:
    name: Build (${{ matrix.component }})
    runs-on: ubuntu-latest
    needs: meta
    strategy:
      fail-fast: false
      matrix:
        component: [client, server, caddy]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push
        id: build-push
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.component }}
          push: true
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          tags: |
            ${{ env.IMAGE_BASE }}-${{ matrix.component }}:${{ needs.meta.outputs.tags }}
          labels: |
            org.opencontainers.image.title=UltimateXO ${{ matrix.component }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ needs.meta.outputs.version }}
          provenance: mode=max
          sbom: true

      - name: Export digest
        run: |
          echo "${{ steps.build-push.outputs.digest }}" > ${{ matrix.component }}-digest.txt

      - name: Upload digest
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.component }}-digest
          path: ${{ matrix.component }}-digest.txt
          retention-days: 1

  security-scan:
    name: Security Scan (${{ matrix.image }})
    runs-on: ubuntu-latest
    needs: [meta, build]
    strategy:
      fail-fast: false
      matrix:
        image: [client, server, caddy]
    steps:
      - name: Download digest
        uses: actions/download-artifact@v4
        with:
          name: ${{ matrix.image }}-digest

      - name: Set digest
        id: digest
        run: echo "digest=$(cat ${{ matrix.image }}-digest.txt)" >> "$GITHUB_OUTPUT"

      - name: Run Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BASE }}-${{ matrix.image }}@${{ steps.digest.outputs.digest }}
          format: sarif
          output: trivy-results.sarif
          severity: CRITICAL,HIGH
          exit-code: "1"

      - name: Upload SARIF
        if: always()
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: trivy-results.sarif

      - name: Table report
        if: always()
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ env.IMAGE_BASE }}-${{ matrix.image }}@${{ steps.digest.outputs.digest }}
          format: table
          severity: CRITICAL,HIGH
          exit-code: "0"

  trigger-deploy:
    name: Trigger Deploy (Release Only)
    runs-on: ubuntu-latest
    needs: [meta, build, security-scan]
    if: ${{ startsWith(github.ref, 'refs/tags/') }}
    steps:
      - name: Trigger deploy workflow
        uses: actions/github-script@v8
        with:
          script: |
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'deploy.yml',
              ref: context.ref.startsWith('refs/tags/')
                ? context.ref.replace('refs/tags/', '')
                : context.ref.replace('refs/heads/', ''),
              inputs: {
                version: '${{ needs.meta.outputs.version }}'
              }
            })

  notify:
    name: Notify
    runs-on: ubuntu-latest
    needs: [meta, build, security-scan]
    if: always()
    steps:
      - name: Discord notification
        uses: sarisia/actions-status-discord@v1
        with:
          webhook: ${{ secrets.DISCORD_WEBHOOK }}
          title: ${{ needs.security-scan.result == 'success' && '✅ Build Success' || '❌ Build Failed' }}
          description: |
            **Version:** `${{ needs.meta.outputs.version }}`
            **Build:** ${{ needs.build.result == 'success' && '✅' || '❌' }}
            **Security:** ${{ needs.security-scan.result == 'success' && '✅' || '❌' }}
            [View Run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
          color: ${{ needs.security-scan.result == 'success' && 0x28a745 || 0xdc3545 }}
          username: "UltimateXO CI"
