name: CI

on:
  pull_request:
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  push:
    branches: [main, dev]
    paths-ignore:
      - "**/*.md"
      - "docs/**"
      - ".gitignore"
      - "LICENSE"
  workflow_dispatch:

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  actions: write
  contents: read
  checks: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: 1
  NODE_VERSION: "22"
  PNPM_VERSION: "10"

jobs:
  changes:
    name: Detect Changes
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read
    outputs:
      server: ${{ steps.filter.outputs.server }}
      client: ${{ steps.filter.outputs.client }}
    steps:
      - uses: actions/checkout@v6
      - uses: dorny/paths-filter@v4
        id: filter
        with:
          filters: |
            server:
              - 'server/**'
            client:
              - 'client/**'

  lint:
    name: Lint & Format
    runs-on: ubuntu-latest
    needs: changes
    if: ${{ needs.changes.outputs.server == 'true' || needs.changes.outputs.client == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable
          components: rustfmt, clippy

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v6
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Install client dependencies
        if: needs.changes.outputs.client == 'true'
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Lint client
        if: needs.changes.outputs.client == 'true'
        working-directory: client
        run: |
          pnpm run lint || true
          pnpm run type-check || true

      - name: Format check
        if: needs.changes.outputs.server == 'true'
        run: cargo fmt --manifest-path server/Cargo.toml --all --check

      - name: Clippy
        if: needs.changes.outputs.server == 'true'
        working-directory: server
        run: cargo clippy --all-targets --all-features -- -D warnings

  test:
    name: Test (${{ matrix.target }})
    runs-on: ubuntu-latest
    needs: changes
    strategy:
      fail-fast: false
      matrix:
        target: [server, client]
        include:
          - target: server
            needs-server: true
            needs-client: false
          - target: client
            needs-server: false
            needs-client: true
    if: ${{ needs.changes.outputs.server == 'true' || needs.changes.outputs.client == 'true' || github.event_name == 'workflow_dispatch' }}
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        if: matrix.needs-server
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Setup Node.js
        if: matrix.needs-client
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - uses: pnpm/action-setup@v6
        if: matrix.needs-client
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Cache Rust dependencies
        if: matrix.needs-server
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: server

      - name: Install client dependencies
        if: matrix.needs-client
        working-directory: client
        run: pnpm install --frozen-lockfile

      - name: Test server
        if: matrix.needs-server
        working-directory: server
        run: cargo test --all-features

      - name: Test client
        if: matrix.needs-client
        working-directory: client
        run: pnpm run test --run || true

  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install cargo-audit
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-audit

      - name: Audit Rust dependencies
        working-directory: server
        run: cargo audit

      - name: Setup pnpm
        uses: pnpm/action-setup@v5
        with:
          version: ${{ env.PNPM_VERSION }}

      - name: Install and audit client
        working-directory: client
        run: |
          pnpm install --frozen-lockfile
          pnpm audit --prod --audit-level=high || true

  docker-build:
    name: Docker Build (${{ matrix.component }})
    runs-on: ubuntu-latest
    needs: [lint, test, security]
    strategy:
      fail-fast: false
      matrix:
        component: [client, server, caddy]
    steps:
      - uses: actions/checkout@v6

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v4

      - name: Build
        uses: docker/build-push-action@v7
        with:
          context: ./${{ matrix.component }}
          push: false
          load: true
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          tags: ultimatexo-${{ matrix.component }}:ci

  trigger-build:
    name: Trigger Build Pipeline
    runs-on: ubuntu-latest
    needs: [lint, test, security, docker-build]
    if: ${{ github.event_name == 'push' && (github.ref == 'refs/heads/main' || github.ref == 'refs/heads/dev') }}
    steps:
      - name: Trigger build workflow
        uses: actions/github-script@v8
        with:
          script: |
            const triggerRef = context.ref.replace('refs/heads/', '');
            await github.rest.actions.createWorkflowDispatch({
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: 'build.yml',
              ref: triggerRef,
              inputs: {
                trigger_ref: triggerRef,
                trigger_sha: context.sha
              }
            })
