name: ✨ Feature Request
description: Suggest a new feature or enhancement
title: "[Feature]: "
labels: ["enhancement", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for suggesting a new feature! Please provide details below.

  - type: textarea
    id: description
    attributes:
      label: Feature Description
      description: What is the problem you're trying to solve and what is your proposed solution?
      placeholder: I'm always frustrated when... so I would like...
    validations:
      required: true

  - type: textarea
    id: mockups
    attributes:
      label: Mockups/Examples/Additional Context
      description: Any mockups, examples, or additional context?
      placeholder: Drag and drop images or provide links...

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
