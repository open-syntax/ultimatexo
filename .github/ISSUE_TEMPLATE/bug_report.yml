name: 🐛 Bug Report
description: Report a bug or unexpected behavior
title: "[Bug]: "
labels: ["bug", "triage"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report this bug! Please fill out the information below.

  - type: textarea
    id: description
    attributes:
      label: Bug Description & Steps to Reproduce
      description: What is the bug? What did you expect to happen? How can we reproduce it?
      placeholder: Tell us what went wrong and how to reproduce it...
    validations:
      required: true

  - type: textarea
    id: environment
    attributes:
      label: System Information & Logs
      description: Provide any relevant environment details (OS, version) or logs.
      placeholder: Paste logs or environment details here...
      render: shell
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Checks
      options:
        - label: I have searched existing issues to ensure this is not a duplicate
          required: true
